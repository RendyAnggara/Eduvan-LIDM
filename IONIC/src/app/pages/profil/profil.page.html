<ion-content [fullscreen]="true">
  <!-- Bagian Header Profil Biru Dinamis -->
  <div class="profile-header">
    <div class="avatar-container">
      <div class="avatar-ring">
        <div
          class="default-avatar-placeholder"
          *ngIf="selectedAvatar === 'assets/icon/avatar-neutral.png' || !selectedAvatar"
        >
          <div class="fb-siluet-wrapper">
            <div class="fb-head"></div>
            <div class="fb-shoulder"></div>
          </div>
        </div>

        <img
          [src]="selectedAvatar"
          class="main-avatar"
          *ngIf="selectedAvatar !== 'assets/icon/avatar-neutral.png' && selectedAvatar"
        />

        <div class="edit-badge" (click)="changeAvatar()">
          <ion-icon name="camera-reverse"></ion-icon>
        </div>
      </div>
    </div>

    <div class="user-info">
      <h1>{{ userProfile?.name ?? 'Memuat Nama...' }}</h1>
      <p>{{ userProfile?.email ?? 'Memuat Email...' }}</p>
    </div>
  </div>

  <!-- Kartu Statistik Bulat Lembut -->
  <div class="stats-card">
    <div class="stat-box">
      <span class="stat-value">{{ angkaKursus }}</span>
      <span class="stat-label">Pelajaran</span>
    </div>
    <div class="divider"></div>
    <div class="stat-box" (click)="goToCertificate()">
      <span class="stat-value">{{ angkaSertifikat }}</span>
      <span class="stat-label primary">Sertifikat</span>
    </div>
  </div>

  <!-- Area Menu Navigasi Siswa -->
  <div class="menu-container">
    <ion-list lines="none">
      <!-- Menu Utama -->
      <ion-item routerLink="/certificate" class="menu-item">
        <div class="icon-wrapper orange" slot="start"><ion-icon name="ribbon"></ion-icon></div>
        <ion-label>Transkip Nilai</ion-label>
        <ion-icon name="chevron-forward" slot="end" class="chevron"></ion-icon>
      </ion-item>

      <ion-item routerLink="/riwayat-transaksi" class="menu-item">
        <div class="icon-wrapper green" slot="start"><ion-icon name="receipt"></ion-icon></div>
        <ion-label>Riwayat Aktivitas</ion-label>
        <ion-icon name="chevron-forward" slot="end" class="chevron"></ion-icon>
      </ion-item>

      <ion-item routerLink="/notifications" class="menu-item">
        <div class="icon-wrapper purple" slot="start"><ion-icon name="notifications"></ion-icon></div>
        <ion-label>Notifikasi</ion-label>
        <ion-icon name="chevron-forward" slot="end" class="chevron"></ion-icon>
      </ion-item>

      <!-- Informasi & Bantuan -->
      <!-- Dibuat searah dengan menu di atas dengan class menu-item -->
      <h3 style="padding-left: 8px; font-weight: 800; color: #093C5D; margin-top: 20px; margin-bottom: 12px;">Informasi & Bantuan</h3>
      
      <ion-item button (click)="setSkModal(true)" class="menu-item">
        <div class="icon-wrapper light-blue" slot="start"><ion-icon name="document-text"></ion-icon></div>
        <ion-label>Syarat & Ketentuan</ion-label>
        <ion-icon name="chevron-forward" slot="end" class="chevron"></ion-icon>
      </ion-item>

      <ion-item button (click)="setPrivacyModal(true)" class="menu-item">
        <div class="icon-wrapper light-green" slot="start"><ion-icon name="shield-checkmark"></ion-icon></div>
        <ion-label>Kebijakan Privasi</ion-label>
        <ion-icon name="chevron-forward" slot="end" class="chevron"></ion-icon>
      </ion-item>

      <!-- Logout -->
      <div class="logout-spacer"></div>
      <ion-item button (click)="bukaKonfirmasiKeluar()" class="menu-item">
        <div class="icon-wrapper red" slot="start"><ion-icon name="log-out"></ion-icon></div>
        <ion-label>Keluar</ion-label>
      </ion-item>
    </ion-list>
  </div>

  <!-- Modals & Alerts tetap sama -->
  <ion-alert [isOpen]="isLogoutAlertOpen" header="Konfirmasi Keluar" message="Apakah kamu yakin ingin keluar dari aplikasi Eduvan?" [buttons]="logoutAlertButtons" class="eduvan-alert-logout" (didDismiss)="isLogoutAlertOpen = false"></ion-alert>

  <!-- (Modal Sk & Privacy tetap sama seperti kode Anda sebelumnya) -->
</ion-content>
