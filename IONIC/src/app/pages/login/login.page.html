<ion-content [fullscreen]="true">
  <!-- Bagian Spanduk Biru Atas -->
  <div class="auth-top-banner">
    <!-- Gelembung Dekoratif -->
    <div class="banner-bubble bubble-1"></div>
    <div class="banner-bubble bubble-2"></div>

    <div class="header-text-group">
      <div class="title-row">
        <h1>Masuk</h1>
      </div>
      <p class="subtitle-text">
        Rasakan lingkungan belajar yang lebih menyenangkan
      </p>
    </div>

    <div class="illustration-box">
      <img src="assets/images/logoedulearn.png" alt="Ilustrasi Pembelajaran" />
    </div>
  </div>

  <!-- Bagian Form Input Utama -->
  <div class="auth-form-body" [formGroup]="loginForm">
    <!-- Input Alamat Email -->
    <span class="input-label-flat">Alamat Email Siswa</span>
    <ion-item lines="none" class="auth-input-flat">
      <ion-icon name="mail-outline" slot="start"></ion-icon>
      <ion-input
        type="email"
        placeholder="Masukkan email kamu..."
        formControlName="email"
      ></ion-input>
      <ion-icon
        name="checkmark-circle"
        slot="end"
        class="valid-check"
        *ngIf="loginForm.get('email')?.value && !loginForm.get('email')?.errors?.['email']"
      ></ion-icon>
    </ion-item>
    
    <div class="quick-tags-smp" *ngIf="loginForm.get('email')?.value && !loginForm.get('email')?.value.includes('@')">
      <span (click)="loginForm.get('email')?.setValue(loginForm.get('email')?.value + '@gmail.com')">+ @gmail.com</span>
    </div>

    <p class="error-text-santai" *ngIf="loginForm.get('email')?.value && loginForm.get('email')?.errors?.['email']">
      Oops! Format email kamu belum benar nih, cek lagi ya ✍️
    </p>

    <!-- Input Kata Sandi -->
    <span class="input-label-flat">Kata Sandi</span>
    <ion-item lines="none" class="auth-input-flat">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Masukkan kata sandi kamu..."
        formControlName="password"
      ></ion-input>
      <ion-icon
        [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"
        slot="end"
        class="eye-toggle"
        (click)="togglePassword()"
      ></ion-icon>
    </ion-item>

    <!-- Pesan Validasi Password (Disederhanakan) -->
    <p class="error-text-santai" *ngIf="loginForm.get('password')?.value && loginForm.get('password')?.value.length < 8">
      Kata sandi minimal 8 karakter ya, yuk dilengkapin! 🔑
    </p>

    <!-- Opsi Remember Me dan Lupa Password -->
    <div class="form-options-row">
      <ion-checkbox mode="md" justify="start" class="remember-chk">Ingat saya</ion-checkbox>
      <span class="forgot-btn" (click)="goToForgotPassword()">Lupa kata sandi?</span>
    </div>

    <!-- Tombol Utama -->
    <ion-button expand="block" class="auth-btn-blue" (click)="onLogin()" [disabled]="isLoading">
      <ion-spinner name="crescent" *ngIf="isLoading" style="--color: #ffffff; width: 22px; height: 22px"></ion-spinner>
      <span *ngIf="!isLoading">
        Mulai Belajar
        <ion-icon name="arrow-forward-outline" class="btn-arrow"></ion-icon>
      </span>
    </ion-button>
  </div>
</ion-content>
